<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= title %></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0A0F24;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #111733;
      border: 1px solid #1E2547;
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-card p {
      color: #8A8FAA;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .sso-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #FFFFFF;
      color: #1A1A1A;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      transition: background 0.2s;
    }
    .sso-btn:hover { background: #F0F0F0; }
    .sso-btn svg { width: 20px; height: 20px; }
    .footer-text {
      margin-top: 24px;
      font-size: 12px;
      color: #555B78;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>ByteStreams Intranet</h1>
    <p>Sign in with your ByteStreams Google Workspace account to continue.</p>

    <a href="/auth/sso/login" class="sso-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    <p class="footer-text">ByteStreams LLC &mdash; Authorized personnel only</p>
  </div>
</body>
</html>
